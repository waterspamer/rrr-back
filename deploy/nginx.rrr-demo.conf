server {
    listen 80;
    server_name rrr-demo.tonforspeed.space;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name rrr-demo.tonforspeed.space;

    ssl_certificate /etc/letsencrypt/live/rrr-demo.tonforspeed.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rrr-demo.tonforspeed.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/rrr-demo_access.log;
    error_log /var/log/nginx/rrr-demo_error.log;

    location / {
        proxy_pass http://127.0.0.1:8083;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
